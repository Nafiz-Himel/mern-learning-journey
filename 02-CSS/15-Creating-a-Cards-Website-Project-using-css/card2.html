<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card2</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container
        {
            width: 100vw;
            height: 100vh;
            /* min-height: 900px; */
            background: #EEAECA;
            background: radial-gradient(circle, rgba(238, 174, 202, 1) 0%, rgba(148, 187, 233, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card
        {
            width: 400px;
            height: 600px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .card img
        {
            width: 100%;
            height: 30%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .textBox
        {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            /* padding: 20px; */
            width: 70%;
            text-align: center;
        }
        #amountBox
        {
            width: 80%;
            height: 10%;
            background-color: #8BC6EC;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 20px;
            padding-left: 20px;
        }
        #leftBox
        {
            width: fit-content;
            display: flex;
            gap: 15px;
            height: 100%;

            align-items: center;
        }
        .imgBox
        {
            height: 25px;
            width: 25px;
        }
        .imgBox img
        {
            height: 1.5rem;
            width: 1.5rem;
        }
        #paymentButton
        {
            width: 80%;
            height: 9%;
            background-color: rgb(30, 30, 190);
            color: white;
            border-radius: 10px;

            box-shadow: 0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23);
        }
        .cencelBox a
        {
            text-decoration: none;
            color: rgb(137, 100, 100);
            font-weight: bold;
            font-size: large;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="img/chip-img.jpg" alt="">

            <div class="textBox">
                <h2>Order Summary</h2>
                <p>
                    Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ratione vitae, doloremque excepturi consequatur id labore ducimus itaque repellendus eveniet ipsam!
                </p>
            </div>

            <div id="amountBox">
                <div id="leftBox">

                    <div class="imgBox">
                        <img src="img/logo.png" alt="">
                    </div>

                    <div class="textAmountBox">
                        <p>Amount</p>
                        <p>$99.9/year</p>
                    </div>

                </div>

                <div class="rightBox">
                    <a href="#">Change</a>
                </div>

            </div>

            <button id="paymentButton">
                Proceed to Payment
            </button>Cancel Order</a>
            </div>
            
        </div>
    </div>
</body>
</html>
