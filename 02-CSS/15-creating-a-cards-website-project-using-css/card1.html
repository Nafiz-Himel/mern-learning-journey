<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card1</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container
        {
            width: 100vw;
            height: 100vh;
            /* min-height: 900px; */
            background: #EEAECA;
            background: radial-gradient(circle, rgba(238, 174, 202, 1) 0%, rgba(148, 187, 233, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card
        {
            width: 360px;
            height: 570px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px;
        }

        .card img
        {
            width: 100%;
            height: 65%;
            border-radius: 10px;
        }

        .card h2
        {
            font-weight: bold;
            font-size: 1.5rem;
        }

        .card p
        {
            font-size: 1.2rem;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="card">
            <img src="img/194625630-9f2ded8c-ec32-4382-8cef-f43837af3828.png" alt="">

            <h2>Improve your front end skills by developing projects</h2>

            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Modi, non! Lorem ipsum dolor sit amet.</p>
        </div>
    </div>
</body>
</html>
